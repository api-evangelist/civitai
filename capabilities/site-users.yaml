naftiko: 1.0.0-alpha2
info:
  label: Civitai Site API — Users
  description: 'Civitai Site API — Users. Retrieve the current authenticated user and look up users by
    username. Self-contained Naftiko capability.'
  tags:
  - Civitai
  - Users
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    CIVITAI_API_KEY: CIVITAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: site-users
    baseUri: https://civitai.com
    description: Civitai Site API — Users.
    resources:
    - name: me
      path: /api/v1/me
      operations:
      - name: getme
        method: GET
        description: Get the current authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /api/v1/users
      operations:
      - name: listusers
        method: GET
        description: List Civitai users.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - { name: username, in: query, type: string }
        - { name: limit, in: query, type: integer }
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.CIVITAI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: site-users-rest
    port: 8080
    description: REST adapter for Civitai Users.
    resources:
    - path: /v1/me
      name: me
      operations:
      - method: GET
        name: getme
        description: Get current user.
        call: site-users.getme
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      operations:
      - method: GET
        name: listusers
        description: List users.
        call: site-users.listusers
        with:
          username: rest.query.username
          limit: rest.query.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: site-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Civitai Users.
    tools:
    - name: civitai-get-me
      description: Get current Civitai user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-users.getme
      outputParameters:
      - type: object
        mapping: $.
    - name: civitai-list-users
      description: List Civitai users.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-users.listusers
      with:
        username: tools.username
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
