naftiko: 1.0.0-alpha2
info:
  label: Civitai Site API — Creators
  description: 'Civitai Site API — Creators. List and search the creators publishing models on Civitai.
    Self-contained Naftiko capability.'
  tags:
  - Civitai
  - Creators
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    CIVITAI_API_KEY: CIVITAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: site-creators
    baseUri: https://civitai.com
    description: Civitai Site API — Creators.
    resources:
    - name: creators
      path: /api/v1/creators
      operations:
      - name: listcreators
        method: GET
        description: List Civitai creators.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - { name: limit, in: query, type: integer }
        - { name: page, in: query, type: integer }
        - { name: query, in: query, type: string }
    - name: tags
      path: /api/v1/tags
      operations:
      - name: listtags
        method: GET
        description: List Civitai catalog tags.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - { name: limit, in: query, type: integer }
        - { name: page, in: query, type: integer }
        - { name: query, in: query, type: string }
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.CIVITAI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: site-creators-rest
    port: 8080
    description: REST adapter for Civitai Creators.
    resources:
    - path: /v1/creators
      name: creators
      operations:
      - method: GET
        name: listcreators
        description: List creators.
        call: site-creators.listcreators
        with:
          limit: rest.query.limit
          page: rest.query.page
          query: rest.query.query
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tags
      name: tags
      operations:
      - method: GET
        name: listtags
        description: List tags.
        call: site-creators.listtags
        with:
          limit: rest.query.limit
          page: rest.query.page
          query: rest.query.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: site-creators-mcp
    port: 9090
    transport: http
    description: MCP adapter for Civitai Creators.
    tools:
    - name: civitai-list-creators
      description: List Civitai creators.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-creators.listcreators
      with:
        limit: tools.limit
        page: tools.page
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: civitai-list-tags
      description: List Civitai tags.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-creators.listtags
      with:
        limit: tools.limit
        page: tools.page
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
