naftiko: 1.0.0-alpha2
info:
  label: Civitai Site API — Models
  description: 'Civitai Site API — Models. List, search, and inspect community-uploaded Stable Diffusion, SDXL,
    Flux, and video model checkpoints, LoRAs, and embeddings. Self-contained Naftiko capability covering one
    Civitai business surface.'
  tags:
  - Civitai
  - Models
  - Stable Diffusion
  - Flux
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    CIVITAI_API_KEY: CIVITAI_API_KEY
capability:
  consumes:
  - type: http
    namespace: site-models
    baseUri: https://civitai.com
    description: Civitai Site API — Models business capability.
    resources:
    - name: models
      path: /api/v1/models
      operations:
      - name: listmodels
        method: GET
        description: List Civitai models with filtering and search.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: query
          in: query
          type: string
        - name: types
          in: query
          type: array
        - name: sort
          in: query
          type: string
        - name: nsfw
          in: query
          type: boolean
    - name: model
      path: /api/v1/models/{id}
      operations:
      - name: getmodel
        method: GET
        description: Get a single Civitai model by ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.CIVITAI_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: site-models-rest
    port: 8080
    description: REST adapter for Civitai Site Models.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for Civitai models list.
      operations:
      - method: GET
        name: listmodels
        description: List Civitai models.
        call: site-models.listmodels
        with:
          limit: rest.query.limit
          query: rest.query.query
          types: rest.query.types
          sort: rest.query.sort
          nsfw: rest.query.nsfw
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models/{id}
      name: model
      operations:
      - method: GET
        name: getmodel
        description: Get a Civitai model.
        call: site-models.getmodel
        with:
          id: rest.path.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: site-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for Civitai Site Models.
    tools:
    - name: civitai-list-models
      description: List Civitai models with filtering.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-models.listmodels
      with:
        limit: tools.limit
        query: tools.query
        types: tools.types
        sort: tools.sort
        nsfw: tools.nsfw
      outputParameters:
      - type: object
        mapping: $.
    - name: civitai-get-model
      description: Get a single Civitai model.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: site-models.getmodel
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
