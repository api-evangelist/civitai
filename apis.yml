  description: Submit AI generation workflows — image, video, audio, language, and LoRA training — through a
    single contract at `https://orchestration.civitai.com`. Races multiple providers and engines (Flux 1/2,
    SDXL, SD1, Z-Image, Qwen, Seedream, Grok, WAN 2.1-2.7, Kling, LTX2, Vidu, Veo 3, HunyuanVideo) behind one
    workflow API. Includes blob upload with NSFW moderation, presigned URLs, in-order serialized webhooks
    (`workflow:succeeded`, `workflow:failed`, etc.), and Buzz-metered billing. Bearer-token authenticated.
