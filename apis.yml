position: Producing
description: Civitai is the largest open community for Stable Diffusion, SDXL, Flux, and video AI models —
  hosting over a million model checkpoints, LoRAs, embeddings, and VAEs uploaded and rated by creators. Beyond
  hosting, Civitai operates a hosted AI image, video, audio, and language generation service through its
  Orchestration API, which races workflows across providers (Flux 1/2, SDXL, SD1, Z-Image, Qwen, Seedream,
  Grok, WAN 2.1-2.7, Kling, LTX2, Vidu, Veo 3, HunyuanVideo) and supports LoRA training jobs. The Site API
  exposes the public catalog plus user vault, permissions, and AIR identifier resolution. OAuth 2.0 with PKCE
  and per-app Buzz spend caps lets third parties build delegated experiences without owning a user's full
  credit balance. Generation is metered in Buzz, a virtual credit topped up via memberships or one-off packs.
