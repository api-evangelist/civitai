  description: Browse and search the Civitai public catalog of Stable Diffusion, SDXL, Flux, and video models.
    The Site API exposes models, model versions, images, creators, tags, users, permissions, and the user vault
    over `https://civitai.com/api/v1/`. Supports hash-based version lookup, AIR identifiers, and Bearer-token
    authentication via personal API keys. Public endpoints are cached; authenticated endpoints are not.
